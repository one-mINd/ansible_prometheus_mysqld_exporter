---
- name: Start docker mysqld exporter container
  community.docker.docker_compose_v2:
    state: present
    project_name: prometheus_mysqld_exporter
    definition:
      version: '2'
      services:
        mysqld_exporter:
          image: "{{ mysqld_exporter_docker_image }}"
          command: "--no-collect.info_schema.innodb_cmp --no-collect.info_schema.innodb_cmpmem --no-collect.slave_status"
          container_name: "{{ mysqld_exporter_container_name }}"
          ports:
            - "127.0.0.1:{{ mysqld_exporter_host_port }}:{{ mysqld_exporter_host_port }}"
          environment:
            - DATA_SOURCE_NAME={{ mysqld_exporter_data_source_name }}
          hostname: "{{ ansible_host }}"
          restart: always
          labels: "{{ mysqld_exporter_docker_labels }}"
      networks:
        default:
          external:
            name: "{{ mysqld_exporter_docker_network_name }}"
  when: mysqld_exporter_config is not defined

- name: Ensure config dir
  become: yes
  become_user: root
  file:
    path: "{{ item }}"
    state: directory
    mode: 0755
    owner: root
    group: root
  with_items:
    - "{{ mysqld_exporter_config_dir }}"
  when: mysqld_exporter_config is defined

- name: Create mysqld config file
  ansible.builtin.copy:
    dest: "{{ mysqld_exporter_config_dir }}/config.cnf"
    content: "{{ mysqld_exporter_config }}"
    owner: root
    group: root
    mode: '0644'
  when: mysqld_exporter_config is defined

- name: Start docker mysqld exporter container
  community.docker.docker_compose_v2:
    state: present
    project_name: prometheus_mysqld_exporter
    definition:
      version: '2'
      services:
        mysqld_exporter:
          image: "{{ mysqld_exporter_docker_image }}"
          command: "--no-collect.info_schema.innodb_cmp --no-collect.info_schema.innodb_cmpmem --no-collect.slave_status --config.my-cnf={{ mysqld_exporter_config_dir }}/config.cnf"
          container_name: "{{ mysqld_exporter_container_name }}"
          ports:
            - "127.0.0.1:{{ mysqld_exporter_host_port }}:{{ mysqld_exporter_host_port }}"
          hostname: "{{ ansible_host }}"
          restart: always
          labels: "{{ mysqld_exporter_docker_labels }}"
          volumes:
            - "{{ mysqld_exporter_config_dir }}:{{ mysqld_exporter_config_dir }}"
      networks:
        default:
          external:
            name: "{{ mysqld_exporter_docker_network_name }}"
  when: mysqld_exporter_config is defined
